include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

stages:
  - lint
  - test
  - coverage
  - build
  - docker

# Create pipelines only for main and merge requests
workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - when: never

default:
  image: node:20
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  interruptible: true

.node-job:
  image: node:20
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/

  before_script:
    - node --version
    - npm --version
    - npm ci
    - mkdir -p reports

lint:
  extends: .node-job
  stage: lint
  script:
    - npm run lint

test:
  extends: .node-job
  stage: test
  script:
    - npm test
  artifacts:
    name: "test-reports-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    when: always
    reports:
      junit: reports/junit.xml
    paths:
      - reports/junit.xml
    expire_in: 14 days

coverage:
  extends: .node-job
  stage: coverage
  script:
    - npm run coverage
  coverage: '/All files[^|]*\|[^|]*\s+([\d\.]+)/'
  artifacts:
    name: "coverage-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    paths:
      - coverage/
    expire_in: 14 days

build:
  extends: .node-job
  stage: build
  script:
    - npm run build
    - tar -czf release.tar.gz dist/
  artifacts:
    name: "build-$CI_COMMIT_REF_SLUG-$CI_COMMIT_SHORT_SHA"
    paths:
      - dist/
      - release.tar.gz
    expire_in: 14 days

docker-build:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  # Build Docker image on main + merge requests
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - docker version
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    # Tag: main -> :main, MR -> :mr-<iid>
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG="$CI_COMMIT_TAG"
      elif [ "$CI_COMMIT_BRANCH" = "main" ]; then
        TAG="main"
      else
        TAG="mr-${CI_MERGE_REQUEST_IID}"
      fi

      echo "Using tag: $TAG"
      docker build -t "$CI_REGISTRY_IMAGE:$TAG" .
      docker push "$CI_REGISTRY_IMAGE:$TAG"
